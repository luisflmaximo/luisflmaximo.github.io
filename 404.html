  <script>
    (function () {
      var currentPath = window.location.pathname || '/';
      if (currentPath.toLowerCase().startsWith('/portefolio/')) {
        var migratedPath = currentPath.slice('/portefolio'.length) || '/';
        window.location.replace(migratedPath + window.location.search + window.location.hash);
        return;
      }

      var basePath = '/';
      var copy = {
        pt: {
          htmlLang: 'pt',
          title: 'Pagina nao encontrada - Luis Maximo',
          skip: 'Saltar para o conteudo',
          desc: 'A pagina que procuras nao existe ou foi movida.',
          home: 'Inicio',
          projects: 'Projetos',
          resume: 'Curriculo',
          paths: { home: 'pt/', projects: 'pt/projetos/', resume: 'pt/curriculo/' }
        },
        en: {
          htmlLang: 'en',
          title: 'Page not found - Luis Maximo',
          skip: 'Skip to content',
          desc: 'The page you are looking for does not exist or has moved.',
          home: 'Home',
          projects: 'Projects',
          resume: 'Resume',
          paths: { home: 'en/', projects: 'en/projects/', resume: 'en/curriculum/' }
        },
        es: {
          htmlLang: 'es',
          title: 'Pagina no encontrada - Luis Maximo',
          skip: 'Saltar al contenido',
          desc: 'La pagina que buscas no existe o fue movida.',
          home: 'Inicio',
          projects: 'Proyectos',
          resume: 'Curriculum',
          paths: { home: 'es/', projects: 'es/proyectos/', resume: 'es/curriculum/' }
        }
      };

      function detectLang() {
        var path = (window.location.pathname || '').toLowerCase();
        var referrer = (document.referrer || '').toLowerCase();
        var pref = '';
        try { pref = localStorage.getItem('lang-pref') || ''; } catch (_) {}
        var nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
        var source = path + ' ' + referrer + ' ' + pref + ' ' + nav;
        if (source.indexOf('/es/') !== -1 || source.indexOf(' es') !== -1 || source.indexOf('es-') !== -1) return 'es';
        if (source.indexOf('/en/') !== -1 || source.indexOf(' en') !== -1 || source.indexOf('en-') !== -1) return 'en';
        return 'pt';
      }

      function applyLang(lang) {
        var langCopy = copy[lang] || copy.pt;
        document.documentElement.lang = langCopy.htmlLang;
        document.title = langCopy.title;
        document.querySelectorAll('[data-i18n]').forEach(function (node) {
          var key = node.getAttribute('data-i18n');
          if (langCopy[key]) node.textContent = langCopy[key];
        });
        document.querySelectorAll('[data-link]').forEach(function (node) {
          var key = node.getAttribute('data-link');
          node.href = basePath + langCopy.paths[key];
        });
        try { localStorage.setItem('lang-pref', lang); } catch (_) {}
      }

      document.querySelectorAll('[data-lang]').forEach(function (button) {
        button.addEventListener('click', function () {
          applyLang(button.getAttribute('data-lang'));
        });
      });

      applyLang(detectLang());

      var currentYear = new Date().getFullYear();
      var copyNode = document.querySelector('.footer__copy');
      if (copyNode) copyNode.innerHTML = copyNode.innerHTML.replace(/\b20\d{2}\b/g, currentYear);
    })();
  </script>
